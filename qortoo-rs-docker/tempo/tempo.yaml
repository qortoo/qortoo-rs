server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_duration: 5m

metrics_generator:
  storage:
    path: /var/tempo/generator/wal
  ring:
    kvstore:
      store: memberlist
  processor:
    local_blocks:
      flush_to_storage: true
      filter_server_spans: false
    service_graphs: {}
    span_metrics: {}

memberlist:
  join_members:
    - tempo:7946

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 24h

overrides:
  metrics_generator_processors:
    - local-blocks
    - service-graphs
    - span-metrics